<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="styles.css?v=v2c4d6">
</head>
<body>
    <div class="calculator-container">
        <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
        </button>
        <div class="calculator">
            <div class="display-container">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="buttons">
                <!-- Scientific Row 1 -->
                <button class="btn scientific" onclick="appendFunction('sin')">sin</button>
                <button class="btn scientific" onclick="appendFunction('cos')">cos</button>
                <button class="btn scientific" onclick="appendFunction('tan')">tan</button>
                <button class="btn scientific" onclick="appendFunction('log')">log</button>
                <button class="btn scientific" onclick="appendFunction('ln')">ln</button>

                <!-- Scientific Row 2 -->
                <button class="btn scientific" onclick="appendOperator('^')">x<sup>y</sup></button>
                <button class="btn scientific" onclick="appendFunction('sqrt')">√</button>
                <button class="btn scientific" onclick="appendConstant('pi')">π</button>
                <button class="btn scientific" onclick="appendConstant('e')">e</button>
                <button class="btn scientific" onclick="toggleRadDeg()" id="rad-deg-btn">Deg</button>

                <!-- Basic Controls -->
                <button class="btn control" onclick="clearDisplay()">AC</button>
                <button class="btn control" onclick="deleteLast()">DEL</button>
                <button class="btn operator" onclick="appendOperator('/')">÷</button>
                <button class="btn operator" onclick="appendOperator('*')">×</button>

                <!-- Numbers and Operators Row 1 -->
                <button class="btn number" onclick="appendNumber('7')">7</button>
                <button class="btn number" onclick="appendNumber('8')">8</button>
                <button class="btn number" onclick="appendNumber('9')">9</button>
                <button class="btn operator" onclick="appendOperator('-')">-</button>

                <!-- Numbers and Operators Row 2 -->
                <button class="btn number" onclick="appendNumber('4')">4</button>
                <button class="btn number" onclick="appendNumber('5')">5</button>
                <button class="btn number" onclick="appendNumber('6')">6</button>
                <button class="btn operator" onclick="appendOperator('+')">+</button>

                <!-- Numbers and Operators Row 3 -->
                <button class="btn number" onclick="appendNumber('1')">1</button>
                <button class="btn number" onclick="appendNumber('2')">2</button>
                <button class="btn number" onclick="appendNumber('3')">3</button>
                <button class="btn equal span-two-v" onclick="compute()">=</button>

                <!-- Bottom Row -->
                <button class="btn number span-two" onclick="appendNumber('0')">0</button>
                <button class="btn number" onclick="appendNumber('.')">.</button>
            </div>
        </div>
    </div>
    <script src="script.js?v=v2c4d6"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
